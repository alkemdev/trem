name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # cpal → alsa-sys needs alsa.pc (same as local Linux dev; see docs/install.md).
      - name: Install system dependencies (ALSA, pkg-config)
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo test --workspace
        run: cargo test --workspace

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo build --release
        run: cargo build --release

      - name: Package Linux binary for download
        run: |
          mkdir -p artifact
          cp target/release/trem artifact/
          strip artifact/trem
          chmod +x artifact/trem
          printf '%s\n' \
            'trem — Linux x86_64 binary built on Ubuntu (GitHub Actions).' \
            '' \
            'Run: chmod +x trem && ./trem' \
            '' \
            'Runtime: install libasound2 on Ubuntu/WSL, e.g. sudo apt install -y libasound2' \
            'Docs: https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/docs/install.md' \
            > artifact/README.txt

      - name: Upload Linux binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: trem-linux-x86_64
          path: artifact/
